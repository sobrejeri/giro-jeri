name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/giro-jeri-platform-GFBFR
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build turista
        run: npm run build --workspace=packages/turista
        env:
          NODE_ENV: production

      - name: Build cooperativa
        run: npm run build --workspace=packages/cooperativa
        env:
          NODE_ENV: production
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Build admin
        run: npm run build --workspace=packages/admin
        env:
          NODE_ENV: production
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Merge builds
        run: |
          mkdir -p dist
          cp -r packages/turista/dist/. dist/
          mkdir -p dist/cooperativa
          cp -r packages/cooperativa/dist/. dist/cooperativa/
          mkdir -p dist/admin
          cp -r packages/admin/dist/. dist/admin/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
